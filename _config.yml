# 站点配置
title: 我的博客
email: your-email@example.com
description: >-
  这是我的个人博客，分享技术、生活和思考。

baseurl: "" # 用户站点留空
url: "https://hugh-ho.github.io" # 你的 GitHub Pages 地址

twitter_username: username
github_username: hugh-ho

# 构建设置
markdown: kramdown
highlighter: rouge
theme: minima # GitHub Pages 支持的主题

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# 分页设置
paginate: 5
paginate_path: "/page:num/"

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/

# 默认设置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: true
